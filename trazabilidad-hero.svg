    <text x="108" y="113" fill="#F8FAFC" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="16" font-weight="700">Lote</text>
    <text x="108" y="138" fill="#94A3B8" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="22" font-weight="800">TS-240315</text>
    <text x="108" y="160" fill="#F59E0B" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="13" font-weight="700">Verificado</text>
  </g>

  <g opacity="0.12">
    <circle cx="1092" cy="74" r="72" fill="#F59E0B"/>
    <circle cx="1150" cy="332" r="52" fill="#1D4ED8"/>
    <circle cx="736" cy="338" r="34" fill="#22C55E"/>
  </g>
</svg>
